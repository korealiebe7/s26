<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Christmas Celebration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'xmas-red': '#8B0000',
                        'xmas-gold': '#D4AF37',
                        'xmas-green': '#004225',
                        'xmas-cream': '#FFFDF5',
                        'deep-ruby': '#5F0A0A',
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        display: ['"Marcellus"', 'serif'],
                        sans: ['"Noto Sans KR"', 'sans-serif'],
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at center, #1a3c34 0%, #0a1f1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            color: #FFFDF5;
            overflow-x: hidden;
        }

        .card-container {
            perspective: 1000px;
            width: 100%;
            max-width: 550px;
        }

        .glass-card {
            background: rgba(255, 253, 245, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border-radius: 2rem;
            overflow: hidden;
            position: relative;
            animation: fadeIn 1.5s ease-out;
        }

        .image-frame {
            position: relative;
            padding: 1.5rem;
            background: linear-gradient(45deg, #004225, #002a18);
        }

        .image-inner-frame {
            border: 2px solid #D4AF37;
            padding: 4px;
            border-radius: 0.75rem;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .image-inner-frame img {
            width: 100%;
            height: auto;
            border-radius: 0.5rem;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .image-inner-frame:hover img {
            transform: scale(1.05);
        }

        .message-content {
            background: linear-gradient(to bottom, rgba(255, 253, 245, 0.05), transparent);
            position: relative;
        }

        .message-content::before {
            content: '"';
            position: absolute;
            top: 1rem;
            left: 2rem;
            font-size: 5rem;
            font-family: 'Playfair Display', serif;
            color: rgba(212, 175, 55, 0.15);
            line-height: 1;
        }

        .gold-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #D4AF37, transparent);
            margin: 2rem 0;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .audio-player-custom {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 50px;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
        }

        .audio-player-custom:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.4);
        }

        .btn-play {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #D4AF37;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #D4AF37;
            width: 0%;
            transition: width 0.1s linear;
        }

        .floating-ornament {
            position: absolute;
            pointer-events: none;
            z-index: 10;
        }

        .korean-text {
            line-height: 1.8;
            letter-spacing: -0.01em;
            word-break: keep-all;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <!-- Main Card -->
        <article class="glass-card">
            
            <!-- Hero Image Section -->
            <div class="image-frame">
                <!-- Decorative Corner -->
                <div class="absolute top-4 left-4 w-8 h-8 border-t-2 border-l-2 border-xmas-gold opacity-50"></div>
                <div class="absolute top-4 right-4 w-8 h-8 border-t-2 border-r-2 border-xmas-gold opacity-50"></div>
                
                <div class="image-inner-frame">
                    <img src='https://opal.google/board/blobs/dd1c9731-0110-46db-8f02-4981287a08d4' alt='Christmas Celebration' />
                </div>

                <div class="mt-6 text-center">
                    <span class="font-display uppercase tracking-[0.4em] text-xs text-xmas-gold block mb-2">Merry Christmas</span>
                    <h1 class="font-serif italic text-4xl text-xmas-cream">2026</h1>
                </div>
            </div>

            <!-- Message Section -->
            <div class="message-content p-8 md:p-12 text-center">
                <div class="inline-block mb-8">
                    <div class="w-16 h-16 rounded-full border-2 border-xmas-gold p-1 mx-auto mb-4 overflow-hidden">
                        <img src='https://opal.google/board/blobs/009e34cb-a61b-43c8-b3e6-7721f38587e8' alt='Sender' class="w-full h-full object-cover rounded-full" />
                    </div>
                    <p class="font-display text-xmas-gold text-sm tracking-widest uppercase">A Heartfelt Message</p>
                </div>

                <p class="korean-text font-sans text-lg md:text-xl text-xmas-cream font-light">
                    AI 선생님들, 어느덧 2026년의 크리스마스가 찾아왔네요. 올 한 해도 곁에서 든든한 길잡이가 되어주신 선생님들의 따뜻한 마음 덕분에 참 감사하고 행복했습니다. 
                </p>
                
                <div class="gold-divider"></div>
                
                <p class="korean-text font-sans text-lg md:text-xl text-xmas-cream font-light">
                    이번 성탄절만큼은 세상의 모든 온기가 선생님들의 공간에 가득 머물러, 그 어느 때보다 포근하고 여유로운 휴식이 되시길 바랍니다. 밝아오는 새해에도 늘 건강하시고, 소망하시는 모든 일들이 기분 좋은 결실로 이어지는 빛나는 한 해 되시기를 진심으로 기원합니다.
                </p>

                <!-- Audio Section -->
                <div class="mt-12">
                    <div class="audio-player-custom" id="customPlayer">
                        <div class="btn-play" id="playBtn">
                            <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-deep-ruby fill-current" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                            </svg>
                            <svg id="pauseIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-deep-ruby fill-current hidden" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <div class="flex flex-col flex-grow items-start">
                            <span class="text-[10px] uppercase tracking-tighter text-xmas-gold mb-1 font-bold">Voice Message</span>
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                        </div>
                        <audio id="audioElement" src='https://opal.google/board/blobs/87b55b33-77a4-4a01-a0f3-62f43284d99f'></audio>
                    </div>
                </div>
            </div>

            <!-- Footer Decorative -->
            <div class="pb-10 px-8 text-center opacity-40">
                <div class="flex justify-center gap-4 text-xmas-gold">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                </div>
            </div>
        </article>
    </div>

    <script>
        const audio = document.getElementById('audioElement');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const progressFill = document.getElementById('progressFill');

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                audio.pause();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        });

        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = pct + '%';
        });

        audio.addEventListener('ended', () => {
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            progressFill.style.width = '0%';
        });

        // Add some subtle sparkles visually if needed (can be expanded)
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'floating-ornament';
            sparkle.innerHTML = '✧';
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';
            sparkle.style.color = '#D4AF37';
            sparkle.style.opacity = Math.random();
            sparkle.style.fontSize = (Math.random() * 10 + 10) + 'px';
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, 3000);
        }

        setInterval(createSparkle, 500);
    </script>
</body>
</html>
